<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#1a1a1a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Refrigerant" />
<meta name="mobile-web-app-capable" content="yes" />
<link rel="manifest" href="/code-of-practice/manifest.json" />
<link rel="icon" href="/code-of-practice/icon-192.png" />
<link rel="apple-touch-icon" href="/code-of-practice/icon-192.png" />
<title>Refrigerant Handling — AU/NZ</title>
<style>
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f4f3ee;
    --bg-tertiary: #ebe9e1;
    --bg-info: #e6f1fb;
    --bg-warning: #faeeda;
    --bg-danger: #fcebeb;
    --bg-success: #eaf3de;
    --text-primary: #1a1a1a;
    --text-secondary: #6b6b6b;
    --text-tertiary: #9a9a9a;
    --text-info: #0c447c;
    --text-warning: #854f0b;
    --text-danger: #791f1f;
    --text-success: #3b6d11;
    --border-tertiary: rgba(0,0,0,0.12);
    --border-secondary: rgba(0,0,0,0.25);
    --radius-md: 8px;
    --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1a1a1a;
      --bg-secondary: #242422;
      --bg-tertiary: #2c2c2a;
      --bg-info: #042c53;
      --bg-warning: #412402;
      --bg-danger: #501313;
      --bg-success: #173404;
      --text-primary: #f0f0f0;
      --text-secondary: #b0b0b0;
      --text-tertiary: #808080;
      --text-info: #b5d4f4;
      --text-warning: #fac775;
      --text-danger: #f7c1c1;
      --text-success: #c0dd97;
      --border-tertiary: rgba(255,255,255,0.15);
      --border-secondary: rgba(255,255,255,0.3);
    }
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif; background: var(--bg-tertiary); color: var(--text-primary); font-size: 16px; line-height: 1.5; }
  body { padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); min-height: 100vh; }
  .app { max-width: 480px; margin: 0 auto; padding: 12px; padding-bottom: calc(12px + env(safe-area-inset-bottom)); }
  h1 { font-size: 18px; font-weight: 500; margin: 8px 0 12px; padding: 0 4px; }
  h1 .ver { font-size: 11px; color: var(--text-tertiary); font-weight: 400; }
  .juris-bar { display: flex; gap: 6px; margin-bottom: 12px; padding: 4px; background: var(--bg-secondary); border-radius: var(--radius-md); }
  .juris-bar button { flex: 1; border: 0; padding: 8px; font-size: 13px; font-weight: 500; border-radius: 6px; background: transparent; color: var(--text-secondary); cursor: pointer; }
  .juris-bar button.active { background: var(--bg-primary); color: var(--text-primary); }
  .tabs { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin-bottom: 16px; }
  .tabs button { border: 0.5px solid var(--border-tertiary); padding: 10px 4px; font-size: 11px; font-weight: 500; border-radius: var(--radius-md); background: transparent; color: var(--text-secondary); cursor: pointer; }
  .tabs button.active { background: var(--bg-primary); color: var(--text-primary); border-color: var(--border-secondary); }
  .panel { display: none; }
  .panel.active { display: block; }
  input, select, textarea, button { font-family: inherit; font-size: 14px; color: var(--text-primary); }
  input, select { background: var(--bg-primary); border: 0.5px solid var(--border-tertiary); border-radius: var(--radius-md); padding: 8px 10px; height: 38px; }
  input:focus, select:focus { outline: 2px solid var(--text-info); outline-offset: -1px; border-color: transparent; }
  .row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .row label { font-size: 13px; color: var(--text-secondary); min-width: 100px; }
  .row input, .row select { flex: 1; min-width: 0; }
  .pill { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 500; }
  .card { background: var(--bg-primary); border: 0.5px solid var(--border-tertiary); border-radius: var(--radius-lg); padding: 14px; margin-bottom: 10px; }
  .kv { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 0.5px solid var(--border-tertiary); font-size: 13px; gap: 8px; }
  .kv:last-child { border-bottom: 0; }
  .kv-k { color: var(--text-secondary); flex-shrink: 0; }
  .kv-v { font-weight: 500; text-align: right; }
  .note { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 10px 12px; font-size: 12px; color: var(--text-secondary); line-height: 1.55; margin-top: 10px; }
  .warn { background: var(--bg-warning); color: var(--text-warning); border-radius: var(--radius-md); padding: 10px 12px; font-size: 12px; line-height: 1.55; margin-top: 10px; }
  .danger { background: var(--bg-danger); color: var(--text-danger); border-radius: var(--radius-md); padding: 10px 12px; font-size: 12px; line-height: 1.55; margin-top: 10px; }
  .ok { background: var(--bg-success); color: var(--text-success); border-radius: var(--radius-md); padding: 10px 12px; font-size: 12px; line-height: 1.55; margin-top: 10px; }
  .step { display: flex; gap: 12px; padding: 10px 0; border-bottom: 0.5px solid var(--border-tertiary); font-size: 13px; line-height: 1.5; }
  .step:last-child { border-bottom: 0; }
  .step-n { flex-shrink: 0; width: 24px; height: 24px; border-radius: 50%; background: var(--bg-secondary); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; }
  .metric { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 14px; }
  .metric-l { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
  .metric-v { font-size: 24px; font-weight: 500; }
  .metric-s { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
  .sub-tabs { display: flex; gap: 4px; margin-bottom: 12px; flex-wrap: wrap; }
  .sub-tabs button { flex: 1 1 70px; border: 0.5px solid var(--border-tertiary); padding: 7px 4px; font-size: 11px; font-weight: 500; border-radius: var(--radius-md); background: transparent; color: var(--text-secondary); cursor: pointer; }
  .sub-tabs button.active { background: var(--bg-primary); color: var(--text-primary); border-color: var(--border-secondary); }
  .tbl { width: 100%; border-collapse: collapse; font-size: 12px; }
  .tbl th, .tbl td { padding: 7px 4px; text-align: left; border-bottom: 0.5px solid var(--border-tertiary); }
  .tbl th { font-weight: 500; color: var(--text-secondary); }
  ul { padding-left: 18px; margin: 8px 0; }
  li { margin: 4px 0; line-height: 1.5; font-size: 13px; }
  .export-row { display: flex; gap: 8px; margin-top: 10px; }
  .btn { background: transparent; border: 0.5px solid var(--border-secondary); padding: 10px 14px; border-radius: var(--radius-md); color: var(--text-primary); font-weight: 500; cursor: pointer; flex: 1; }
  .btn:active { transform: scale(0.98); }
  .install-banner { background: var(--bg-info); color: var(--text-info); border-radius: var(--radius-md); padding: 10px 12px; font-size: 12px; line-height: 1.5; margin-bottom: 12px; display: none; }
  .install-banner button { margin-top: 6px; }
  .src { font-size: 11px; color: var(--text-tertiary); margin-top: 8px; text-align: right; }
  details summary { cursor: pointer; font-size: 13px; padding: 8px 0; }
</style>
</head>
<body>
<div class="app">
  <h1>Refrigerant handling — AU/NZ <span class="ver">v2 · offline</span></h1>

  <div id="install-banner" class="install-banner">
    <strong>Install for offline use:</strong> tap your browser menu → "Add to home screen" or "Install app". Once installed, it works without signal.
    <button class="btn" id="dismiss-banner" style="margin-top: 8px;">Got it</button>
  </div>

  <div class="juris-bar">
    <button id="j-au" class="active">Australia</button>
    <button id="j-nz">New Zealand</button>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="ref">Refrig.</button>
    <button class="tab-btn" data-tab="calc">Calc</button>
    <button class="tab-btn" data-tab="tools">Tools</button>
    <button class="tab-btn" data-tab="proc">Proc.</button>
    <button class="tab-btn" data-tab="info">Ref.</button>
  </div>

  <div id="panel-ref" class="panel active">
    <input id="ref-search" placeholder="Search R32, R290, ammonia…" style="width: 100%; margin-bottom: 8px;" />
    <select id="ref-select" style="width: 100%; margin-bottom: 12px;"></select>
    <div id="ref-detail"></div>
  </div>

  <div id="panel-calc" class="panel">
    <div class="sub-tabs" id="calc-tabs">
      <button class="active" data-calc="sfc">Safe fill</button>
      <button data-calc="leak">Leak freq</button>
      <button data-calc="drop">Drop test</button>
      <button data-calc="torq">Torque</button>
    </div>
    <div id="calc-body"></div>
  </div>

  <div id="panel-tools" class="panel">
    <div class="sub-tabs" id="tool-tabs">
      <button class="active" data-tool="room">Min room (A2L)</button>
      <button data-tool="masstemp">Cyl. fill mass</button>
      <button data-tool="tco2">tCO₂e</button>
    </div>
    <div id="tool-body"></div>
  </div>

  <div id="panel-proc" class="panel">
    <select id="proc-select" style="width: 100%; margin-bottom: 12px;">
      <option value="evac-deep">Deep evacuation</option>
      <option value="evac-triple">Triple evacuation</option>
      <option value="leak-test">Leak tightness test</option>
      <option value="charge">Refrigerant charging</option>
      <option value="recovery">Refrigerant recovery</option>
      <option value="decom">Decommissioning</option>
    </select>
    <div id="proc-body"></div>
  </div>

  <div id="panel-info" class="panel">
    <select id="info-select" style="width: 100%; margin-bottom: 12px;">
      <option value="label-new">Identification plate fields</option>
      <option value="label-change">Refrigerant change label</option>
      <option value="logbook">Logbook entries (≥3kg)</option>
      <option value="leak-detect">Leak detection methods</option>
      <option value="prohibited">Prohibited charging rules</option>
      <option value="discharge">Discharge examples (banned)</option>
      <option value="competent">Who can do the work</option>
    </select>
    <div id="info-body"></div>
  </div>
</div>

<script src="app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/code-of-practice/sw.js', { scope: '/code-of-practice/' }).catch(() => {});
    });
  }
  // Show install banner once per device
  if (!localStorage.getItem('install-banner-dismissed') && !window.matchMedia('(display-mode: standalone)').matches) {
    document.getElementById('install-banner').style.display = 'block';
  }
  document.getElementById('dismiss-banner').onclick = () => {
    localStorage.setItem('install-banner-dismissed', '1');
    document.getElementById('install-banner').style.display = 'none';
  };
</script>
</body>
</html>
